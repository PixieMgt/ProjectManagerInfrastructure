version: "3.9"

services:
  frontend:
    image: projectmanagerfrontend
    container_name: frontend
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "/api"
    networks:
      - pmnet

  backend:
    image: projectmanagerbackend
    container_name: backend
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    networks:
      - pmnet

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - pmnet

networks:
  pmnet:
